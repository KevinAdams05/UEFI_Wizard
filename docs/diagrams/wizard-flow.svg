<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1180" font-family="Noto Sans, DejaVu Sans, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .page { fill: #f3f6fa; stroke: #355070; stroke-width: 1.5; rx: 8; ry: 8; }
      .branch { fill: #fff3d6; stroke: #b08000; stroke-width: 1.2; rx: 6; ry: 6; }
      .terminal { fill: #d6ffe1; stroke: #2d6a3a; stroke-width: 1.5; rx: 8; ry: 8; }
      .reject { fill: #ffe0e0; stroke: #a02020; stroke-width: 1.2; rx: 6; ry: 6; }
      .label { font-weight: 600; fill: #1a1a1a; }
      .small { font-size: 11px; fill: #444; }
      .edge { stroke: #444; stroke-width: 1.4; fill: none; }
      .edge-label { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 18px; font-weight: 700; fill: #222; }
      .legend { font-size: 11px; fill: #333; }
    </style>
  </defs>

  <text x="20" y="30" class="title">UEFI Wizard — wizard flow</text>
  <text x="20" y="50" class="small">v1: copy + create ESP, no NVRAM. Live-USB target.</text>

  <!-- Page 1: Welcome -->
  <rect x="380" y="80" width="220" height="60" class="page"/>
  <text x="490" y="105" text-anchor="middle" class="label">1. Welcome</text>
  <text x="490" y="125" text-anchor="middle" class="small">Explain the problem &amp; the fix</text>

  <!-- Page 2: Pick disk -->
  <rect x="380" y="180" width="220" height="60" class="page"/>
  <text x="490" y="205" text-anchor="middle" class="label">2. Pick target disk</text>
  <text x="490" y="225" text-anchor="middle" class="small">BDiskDeviceRoster &#8594; BColumnListView</text>

  <!-- Page 3: ESP status -->
  <rect x="380" y="280" width="220" height="60" class="page"/>
  <text x="490" y="305" text-anchor="middle" class="label">3. ESP status</text>
  <text x="490" y="325" text-anchor="middle" class="small">ESPManager::Detect() — classify</text>

  <!-- Branches -->
  <rect x="40" y="400" width="200" height="80" class="branch"/>
  <text x="140" y="425" text-anchor="middle" class="label">Valid ESP found</text>
  <text x="140" y="445" text-anchor="middle" class="small">FAT32, EFI System type GUID,</text>
  <text x="140" y="460" text-anchor="middle" class="small">readable.</text>
  <text x="140" y="475" text-anchor="middle" class="small">&#8594; Skip create, copy only.</text>

  <rect x="270" y="400" width="200" height="80" class="branch"/>
  <text x="370" y="425" text-anchor="middle" class="label">No ESP, &#8805; 256 MB free</text>
  <text x="370" y="445" text-anchor="middle" class="small">Unallocated space found</text>
  <text x="370" y="460" text-anchor="middle" class="small">on a GPT disk.</text>
  <text x="370" y="475" text-anchor="middle" class="small">&#8594; Offer to create ESP.</text>

  <rect x="500" y="400" width="200" height="80" class="reject"/>
  <text x="600" y="425" text-anchor="middle" class="label">No ESP, no free space</text>
  <text x="600" y="445" text-anchor="middle" class="small">Disk fully partitioned.</text>
  <text x="600" y="460" text-anchor="middle" class="small">&#8594; Refuse, suggest</text>
  <text x="600" y="475" text-anchor="middle" class="small">DriveSetup to free space.</text>

  <rect x="730" y="400" width="200" height="80" class="reject"/>
  <text x="830" y="425" text-anchor="middle" class="label">FAT32, wrong GPT type</text>
  <text x="830" y="445" text-anchor="middle" class="small">Looks like an ESP but type</text>
  <text x="830" y="460" text-anchor="middle" class="small">GUID is wrong.</text>
  <text x="830" y="475" text-anchor="middle" class="small">&#8594; Out of scope in v1.</text>

  <!-- Edges from page 3 to branches -->
  <path d="M 430 340 L 140 400" class="edge" marker-end="url(#arrow)"/>
  <path d="M 470 340 L 370 400" class="edge" marker-end="url(#arrow)"/>
  <path d="M 510 340 L 600 400" class="edge" marker-end="url(#arrow)"/>
  <path d="M 550 340 L 830 400" class="edge" marker-end="url(#arrow)"/>

  <!-- Page 4: Confirm -->
  <rect x="100" y="540" width="320" height="60" class="page"/>
  <text x="260" y="565" text-anchor="middle" class="label">4. Confirm</text>
  <text x="260" y="585" text-anchor="middle" class="small">Final summary + Apply / Cancel</text>

  <!-- Edges from valid_ESP and no_ESP_free into Confirm -->
  <path d="M 140 480 C 140 510, 220 520, 220 540" class="edge" marker-end="url(#arrow)"/>
  <path d="M 370 480 C 370 510, 300 520, 300 540" class="edge" marker-end="url(#arrow)"/>

  <!-- Reject paths terminate -->
  <rect x="500" y="540" width="200" height="50" class="reject"/>
  <text x="600" y="570" text-anchor="middle" class="small">Exit with diagnostic</text>
  <path d="M 600 480 L 600 540" class="edge" marker-end="url(#arrow)"/>

  <rect x="730" y="540" width="200" height="50" class="reject"/>
  <text x="830" y="570" text-anchor="middle" class="small">Exit with diagnostic</text>
  <path d="M 830 480 L 830 540" class="edge" marker-end="url(#arrow)"/>

  <!-- Page 5: Progress -->
  <rect x="100" y="650" width="320" height="220" class="page"/>
  <text x="260" y="675" text-anchor="middle" class="label">5. Progress</text>
  <text x="115" y="700" class="small">[ ] Create 256 MB FAT32 partition</text>
  <text x="115" y="720" class="small">    (skipped if ESP already exists)</text>
  <text x="115" y="745" class="small">[ ] Set GPT type GUID</text>
  <text x="115" y="765" class="small">    C12A7328-F81F-11D2-BA4B-00A0C93EC93B</text>
  <text x="115" y="790" class="small">[ ] Format FAT32</text>
  <text x="115" y="815" class="small">[ ] Mount ESP</text>
  <text x="115" y="840" class="small">[ ] Copy haiku_loader.efi &#8594;</text>
  <text x="115" y="858" class="small">    /EFI/BOOT/BOOT&lt;arch&gt;.EFI + /EFI/Haiku/</text>

  <path d="M 260 600 L 260 650" class="edge" marker-end="url(#arrow)"/>

  <!-- Page 6: Done -->
  <rect x="100" y="920" width="320" height="60" class="terminal"/>
  <text x="260" y="945" text-anchor="middle" class="label">6. Done</text>
  <text x="260" y="965" text-anchor="middle" class="small">Summary + "Reboot now"</text>
  <path d="M 260 870 L 260 920" class="edge" marker-end="url(#arrow)"/>

  <!-- Inter-page progression edges (1->2->3) -->
  <path d="M 490 140 L 490 180" class="edge" marker-end="url(#arrow)"/>
  <path d="M 490 240 L 490 280" class="edge" marker-end="url(#arrow)"/>

  <!-- CLI parallel path -->
  <rect x="640" y="650" width="280" height="220" class="page" stroke-dasharray="6 4"/>
  <text x="780" y="675" text-anchor="middle" class="label">CLI: haiku-uefi-setup</text>
  <text x="655" y="700" class="small">Same ESPManager + LoaderInstaller</text>
  <text x="655" y="720" class="small">Flags:</text>
  <text x="655" y="740" class="small">  --disk /dev/disk/...</text>
  <text x="655" y="760" class="small">  --create-esp / --copy-only</text>
  <text x="655" y="780" class="small">  --dry-run</text>
  <text x="655" y="800" class="small">  --yes (skip confirm)</text>
  <text x="655" y="830" class="small">Exit codes:</text>
  <text x="655" y="850" class="small">  0 ok  · 1 user-error  · 2 internal</text>

  <!-- Legend -->
  <text x="20" y="1020" class="title" style="font-size:14px;">Legend</text>
  <rect x="20" y="1035" width="20" height="14" class="page"/>
  <text x="48" y="1047" class="legend">Wizard page</text>
  <rect x="160" y="1035" width="20" height="14" class="branch"/>
  <text x="188" y="1047" class="legend">Branch / state</text>
  <rect x="320" y="1035" width="20" height="14" class="reject"/>
  <text x="348" y="1047" class="legend">Refusal / out of scope</text>
  <rect x="500" y="1035" width="20" height="14" class="terminal"/>
  <text x="528" y="1047" class="legend">Success terminal</text>

  <text x="20" y="1080" class="small">Components in dashed box are CLI-only (same backend, no wizard).</text>
  <text x="20" y="1100" class="small">v1 does not write a UEFI Boot#### NVRAM entry — relies on firmware's removable-media fallback.</text>
</svg>
